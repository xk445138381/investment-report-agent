name: Deploy Verify

on:
  workflow_dispatch:
    inputs:
      backend_url:
        description: "Backend origin, for example https://api.example.com"
        required: true
        type: string
      frontend_url:
        description: "Frontend origin, for example https://app.example.com"
        required: true
        type: string
      api_url:
        description: "Frontend API URL, expected to end with /api/v1"
        required: true
        type: string

jobs:
  deploy-verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify deployed target
        run: |
          python scripts/predeploy_check.py --production-target \
            --backend-url "${{ inputs.backend_url }}" \
            --frontend-url "${{ inputs.frontend_url }}" \
            --api-url "${{ inputs.api_url }}"
